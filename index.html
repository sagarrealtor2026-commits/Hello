<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <h2>Player (You)</h2>
                <p id="player-score">0</p>
            </div>
            <div class="score">
                <h2>Computer</h2>
                <p id="computer-score">0</p>
            </div>
        </div>

        <div class="game-container">
            <canvas id="pong-canvas" width="800" height="400"></canvas>
        </div>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>Move mouse up/down OR use Arrow Keys to control the left paddle</p>
            <p>Computer controls the right paddle automatically</p>
            <p>Press <strong>SPACE</strong> to start the game</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
